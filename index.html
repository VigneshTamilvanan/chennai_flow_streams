<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="ChennaiSafe — Smart property decision tool. Check flood risk, property rates, commute times and facilities before buying in Chennai." />
  <title>ChennaiSafe — Smart Property Insights</title>

  <link rel="stylesheet" href="css/leaflet.css" />
  <link rel="stylesheet" href="css/L.Control.Locate.min.css" />
  <link rel="stylesheet" href="css/fontawesome-all.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       ONBOARDING WIZARD
  ════════════════════════════════════════ -->
  <div id="onboarding" class="onboarding-overlay">
    <div class="ob-card">
      <div class="ob-top">
        <div class="ob-logo">🌊 ChennaiSafe</div>
        <div class="ob-tagline">Check flood risk, rates & commute before you buy.<br>Not just a map — a decision tool.</div>
        <div class="ob-progress">
          <div class="ob-dot active"></div>
          <div class="ob-dot"></div>
          <div class="ob-dot"></div>
          <div class="ob-dot"></div>
        </div>
      </div>
      <div class="ob-body">
        <div class="ob-question" id="ob-question">Where do you work?</div>
        <div class="ob-options" id="ob-options"></div>
      </div>
      <div class="ob-footer">
        <button class="ob-skip" id="ob-skip">Skip quiz</button>
        <button class="ob-next" id="ob-next" disabled>Next →</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       HEADER
  ════════════════════════════════════════ -->
  <header id="app-header">
    <div class="header-brand">
      <span class="brand-icon">🌊</span>
      <span class="brand-name">ChennaiSafe</span>
    </div>

    <div class="search-container">
      <div class="search-box">
        <i class="fa fa-search search-icon"></i>
        <input
          type="text"
          id="search-input"
          placeholder="Search area, landmark, pincode..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="clear-btn hidden" id="clear-search">✕</button>
      </div>
      <div id="search-dropdown" class="search-dropdown hidden"></div>
    </div>

    <div class="header-actions">
      <button class="btn-primary" id="my-picks-btn">⭐ My Picks</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       MAP
  ════════════════════════════════════════ -->
  <div id="map"></div>

  <!-- ═══════════════════════════════════════
       SIDEBAR — Area Profile
  ════════════════════════════════════════ -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-location">Select an area</span>
      <button class="sidebar-close" id="sidebar-close">✕</button>
    </div>
    <div id="sidebar-content">
      <div style="padding:40px 20px;text-align:center;color:#9ca3af;">
        <div style="font-size:40px;margin-bottom:12px">📍</div>
        <div style="font-size:14px;font-weight:600;color:#374151;margin-bottom:6px">Click any area on the map</div>
        <div style="font-size:12.5px;line-height:1.5">Get flood risk score, property rates,<br>commute times and nearby facilities</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       RECOMMENDATIONS PANEL
  ════════════════════════════════════════ -->
  <div id="reco-panel">
    <div class="reco-handle"></div>
    <div class="reco-header">
      <div class="reco-title">Your <span>Top Picks</span></div>
      <button class="reco-close" id="reco-close">✕</button>
    </div>
    <div class="reco-list" id="reco-list"></div>
  </div>

  <!-- ═══════════════════════════════════════
       FAB CONTROLS
  ════════════════════════════════════════ -->
  <div class="map-fabs">
    <button class="fab-btn" id="fab-locate" title="My Location">
      <i class="fa fa-location-arrow"></i>
    </button>
    <button class="fab-btn fab-pin-btn" id="fab-pin" title="Drop a Pin">
      <!-- Map-pin icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </button>
    <button class="fab-btn fab-layers-btn" id="fab-layers" title="Map Layers">
      <!-- Layers icon (shown when closed) -->
      <svg class="fab-icon-layers" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
      <!-- Close icon (shown when open) -->
      <svg class="fab-icon-close" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- ═══════════════════════════════════════
       LAYER PANEL
  ════════════════════════════════════════ -->
  <div id="layer-panel">
    <div class="layer-title" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Map Layers</span>
      <button id="layer-panel-close" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:14px;padding:0;line-height:1;" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <label class="layer-item">
      <input type="checkbox" id="toggle-streams" />
      <span class="layer-dot" style="background:#001FE7"></span>
      <span class="layer-item-text">
        <span class="layer-item-name">Flood Streams</span>
        <span class="layer-item-sub">Natural drainage lines (DEM)</span>
      </span>
    </label>
    <label class="layer-item">
      <input type="checkbox" id="toggle-substreams" />
      <span class="layer-dot" style="background:#00BFFF;opacity:0.8"></span>
      <span class="layer-item-text">
        <span class="layer-item-name">Drainage Network</span>
        <span class="layer-item-sub">Sub-stream coverage</span>
      </span>
    </label>
    <label class="layer-item">
      <input type="checkbox" id="toggle-dem" />
      <span class="layer-dot" style="background:linear-gradient(135deg,#8B4513,#228B22)"></span>
      <span class="layer-item-text">
        <span class="layer-item-name">Elevation (DEM)</span>
        <span class="layer-item-sub">ALOS PALSAR terrain data</span>
      </span>
    </label>
    <label class="layer-item">
      <input type="checkbox" id="toggle-zones" checked />
      <span class="layer-dot" style="background:linear-gradient(135deg,#16a34a,#dc2626)"></span>
      <span class="layer-item-text">
        <span class="layer-item-name">Zone Markers</span>
        <span class="layer-item-sub">Flood risk by area</span>
      </span>
    </label>
    <label class="layer-item">
      <input type="checkbox" id="toggle-localities" checked />
      <span class="layer-dot" style="background:#9ca3af;border-radius:50%"></span>
      <span class="layer-item-text">
        <span class="layer-item-name">OSM Localities</span>
        <span class="layer-item-sub" id="localities-sub">Loading from OpenStreetMap…</span>
      </span>
    </label>
    <label class="layer-item">
      <input type="checkbox" id="toggle-metro" />
      <span class="layer-dot" style="background:#8b5cf6;border-radius:50%"></span>
      <span class="layer-item-text">
        <span class="layer-item-name">Metro Rail</span>
        <span class="layer-item-sub" id="metro-sub">Loading Chennai Metro…</span>
      </span>
    </label>
  </div>

  <!-- ═══════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════ -->
  <script src="js/leaflet.js"></script>
  <script src="js/Autolinker.min.js"></script>
  <script src="data/streams_line_3.js"></script>
  <script src="data/chennai-data.js"></script>
  <script src="js/flood-score.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Boot the app once DOM + data are ready
    document.addEventListener('DOMContentLoaded', () => {
      App.init(typeof json_streams_line_3 !== 'undefined' ? json_streams_line_3 : null);
    });
  </script>
</body>
</html>
